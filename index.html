<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>salaat • map</title>
    <!-- Leaflet (light) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f3f1ec;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1c2b33;
        }
        /* header — just a line */
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: #ffffffba;
            backdrop-filter: blur(4px);
            border-bottom: 1px solid #d4cdc0;
            font-weight: 350;
            letter-spacing: 0.2px;
        }
        .top h2 {
            font-weight: 350;
            font-size: 1.3rem;
            color: #3f4e56;
        }
        .top h2 span {
            color: #8e9ca3;
            margin-right: 0.3rem;
        }
        .method-wrap {
            background: #e3ddd2;
            border-radius: 40px;
            padding: 0.25rem 0.8rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .method-wrap select {
            background: transparent;
            border: none;
            font-size: 0.8rem;
            font-weight: 450;
            padding: 0.3rem 0;
            outline: none;
            color: #1f2e36;
        }
        /* main grid: map (70%) + times (30%) */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .map-panel {
            flex: 3;  /* 70% roughly */
            position: relative;
            background: #dbd5ca;
            border-right: 1px solid #c2b9ab;
        }
        #map {
            width: 100%;
            height: 100%;
            background: #d6d2c9;
        }
        .map-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 1px solid #b7ad9e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            color: #1f353f;
            display: flex;
            gap: 10px;
            pointer-events: none;
        }
        .map-overlay span {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-weight: 450;
        }
        .times-panel {
            flex: 1.2;  /* ~30% */
            background: #faf8f4;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem 1.2rem;
            border-left: 1px solid #ddd2c4;
            min-width: 240px;
        }
        .place-row {
            display: flex;
            gap: 6px;
            margin-bottom: 2rem;
            background: #ede8e0;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #cdc2b4;
        }
        .place-row input {
            flex: 1;
            border: none;
            background: none;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            outline: none;
            color: #1e2f38;
        }
        .place-row button {
            background: #d9d0c2;
            border: none;
            border-radius: 60px;
            padding: 0.5rem 1.4rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2b3c45;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        .place-row button:hover {
            background: #cdc1b1;
        }
        .prayer-list {
            margin-top: 0.2rem;
            border-top: 1px solid #dad1c3;
            padding-top: 0.6rem;
        }
        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.2rem;
            border-bottom: 1px solid #e7dfd3;
            font-size: 1.2rem;
            font-weight: 340;
        }
        .prayer-item .name {
            font-weight: 400;
            color: #3e535d;
        }
        .prayer-item .time {
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
        }
        .footnote {
            margin-top: auto;
            font-size: 0.65rem;
            color: #948e82;
            display: flex;
            justify-content: space-between;
            border-top: 1px dashed #d3cbbf;
            padding-top: 1rem;
        }
        .error-note {
            color: #b44e3a;
            font-size: 0.75rem;
            min-height: 1.2rem;
            margin-top: 0.5rem;
        }
        /* tiny */
        .ping {
            background: #c3d1d6;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="top">
        <h2><span>🕊️</span> prayer · map</h2>
        <div class="method-wrap">
            <span>method</span>
            <select id="methodSelect">
                <option value="3" selected>MWL</option>
                <option value="0">Jafari</option>
                <option value="1">Karachi</option>
                <option value="2">ISNA</option>
                <option value="4">Makkah</option>
                <option value="5">Egypt</option>
                <option value="7">Tehran</option>
            </select>
        </div>
    </div>

    <div class="main">
        <!-- map column -->
        <div class="map-panel">
            <div id="map"></div>
            <div class="map-overlay">
                <span>📍</span>
                <span id="mapLatLng">21.42°N 39.83°E</span>
            </div>
        </div>

        <!-- times column (clean) -->
        <div class="times-panel">
            <div class="place-row">
                <input type="text" id="cityInput" placeholder="city, place" value="Mecca">
                <button id="searchBtn">🔍</button>
            </div>

            <div class="prayer-list">
                <div class="prayer-item"><span class="name">Fajr</span><span class="time" id="fajr">--:--</span></div>
                <div class="prayer-item"><span class="name">Sunrise</span><span class="time" id="sunrise">--:--</span></div>
                <div class="prayer-item"><span class="name">Dhuhr</span><span class="time" id="dhuhr">--:--</span></div>
                <div class="prayer-item"><span class="name">Asr</span><span class="time" id="asr">--:--</span></div>
                <div class="prayer-item"><span class="name">Maghrib</span><span class="time" id="maghrib">--:--</span></div>
                <div class="prayer-item"><span class="name">Isha</span><span class="time" id="isha">--:--</span></div>
            </div>

            <div class="footnote">
                <span id="currentDate"></span>
                <span id="tzOffset"></span>
            </div>
            <div id="errorMsg" class="error-note"></div>
            <div style="margin-top: 0.8rem; font-size: 0.7rem; color:#8d988b;">click map → update times</div>
        </div>
    </div>

    <!-- leaflet js -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        (function() {
            // ----------------------------------------------------
            // precise prayer calculation (adhan algorithm)
            // ----------------------------------------------------
            const degRad = Math.PI / 180;

            function computePrayerTimes(lat, lon, method, date = new Date()) {
                const y = date.getFullYear();
                const m = date.getMonth() + 1;
                const d = date.getDate();

                // julian day helper
                const jd = (() => {
                    let year = y, month = m, day = d;
                    if (month <= 2) { year -= 1; month += 12; }
                    const A = Math.floor(year / 100);
                    const B = 2 - A + Math.floor(A / 4);
                    return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + B - 1524.5;
                })();

                const daysSinceJ2000 = jd - 2451545.0;
                const g = (357.529 + 0.98560028 * daysSinceJ2000) % 360;
                const q = (280.459 + 0.98564736 * daysSinceJ2000) % 360;
                const L = (q + 1.915 * Math.sin(g * degRad) + 0.020 * Math.sin(2 * g * degRad)) % 360;
                const eps = 23.439 - 0.00000036 * daysSinceJ2000;
                const RA = Math.atan2(Math.cos(eps * degRad) * Math.sin(L * degRad), Math.cos(L * degRad)) / degRad;
                const decl = Math.asin(Math.sin(eps * degRad) * Math.sin(L * degRad)) / degRad;

                // equation of time (minutes)
                const eqTime = ((q - 0.0057183 - RA + (q - L < 180 ? 0 : 360)) % 360) * 4;

                // solar noon (minutes from midnight UTC)
                const noon = 720 - 4 * lon - eqTime; 

                // method angles
                const angles = {
                    0: { fajr: 16, isha: 14 },       // Jafari
                    1: { fajr: 18, isha: 18 },        // Karachi
                    2: { fajr: 15, isha: 15 },         // ISNA
                    3: { fajr: 18, isha: 17 },         // MWL
                    4: { fajr: 18.5, isha: '90min' },  // Makkah
                    5: { fajr: 19.5, isha: 17.5 },     // Egypt
                    7: { fajr: 17.7, isha: 14 }        // Tehran
                };
                const mth = parseInt(method, 10);
                const fajrAngle = angles[mth]?.fajr ?? 18;
                let ishaAngle = angles[mth]?.isha ?? 17;
                let ishaFixedMin = null;
                if (mth === 4 && ishaAngle === '90min') { ishaFixedMin = 90; ishaAngle = null; }

                const latRad = lat * degRad;

                const computeTime = (angle, isSunrise = false, isAsr = false) => {
                    if (isAsr) {
                        // asr (shafii) shadow = 1
                        const arg = (Math.sin(Math.atan(1 / (1 + Math.tan(Math.abs(lat - decl) * degRad)))) - Math.sin(decl * degRad) * Math.sin(latRad)) 
                                    / (Math.cos(decl * degRad) * Math.cos(latRad));
                        const altAsr = Math.asin(Math.max(-1, Math.min(1, arg))) / degRad;
                        const cosH = (Math.sin(altAsr * degRad) - Math.sin(decl*degRad)*Math.sin(latRad)) 
                                    / (Math.cos(decl*degRad)*Math.cos(latRad));
                        const H = Math.acos(Math.max(-1, Math.min(1, cosH))) / degRad;
                        return noon + (H * 4);
                    }
                    if (isSunrise) {
                        const cosH = (Math.sin(-0.833 * degRad) - Math.sin(decl*degRad)*Math.sin(latRad)) 
                                    / (Math.cos(decl*degRad)*Math.cos(latRad));
                        const H = Math.acos(Math.max(-1, Math.min(1, cosH))) / degRad;
                        return noon - (H * 4);
                    }
                    const cosH = (Math.sin(angle * degRad) - Math.sin(decl*degRad)*Math.sin(latRad)) 
                                / (Math.cos(decl*degRad)*Math.cos(latRad));
                    const H = Math.acos(Math.max(-1, Math.min(1, cosH))) / degRad;
                    return noon - (H * 4);
                };

                const fajr = computeTime(fajrAngle, false, false);
                const sunrise = computeTime(null, true, false);
                const dhuhr = noon;
                const asr = computeTime(null, false, true);
                const maghrib = 2*noon - sunrise;  // sunset
                let isha;
                if (ishaFixedMin !== null) isha = maghrib + ishaFixedMin;
                else {
                    const ishaT = computeTime(ishaAngle, false, false);
                    isha = noon + (noon - ishaT);
                }

                let times = [fajr, sunrise, dhuhr, asr, maghrib, isha];
                const utcOffset = -date.getTimezoneOffset(); // minutes
                return times.map(t => ((t + utcOffset + 1440) % 1440));
            }

            const formatTime = (min) => {
                if (min === null || isNaN(min)) return '--:--';
                const h = Math.floor(min / 60) % 24;
                const m = Math.floor(min % 60);
                return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            };

            // DOM
            const cityInput = document.getElementById('cityInput');
            const searchBtn = document.getElementById('searchBtn');
            const methodSelect = document.getElementById('methodSelect');
            const fajrEl = document.getElementById('fajr');
            const sunriseEl = document.getElementById('sunrise');
            const dhuhrEl = document.getElementById('dhuhr');
            const asrEl = document.getElementById('asr');
            const maghribEl = document.getElementById('maghrib');
            const ishaEl = document.getElementById('isha');
            const mapLatLngEl = document.getElementById('mapLatLng');
            const dateEl = document.getElementById('currentDate');
            const tzEl = document.getElementById('tzOffset');
            const errorEl = document.getElementById('errorMsg');

            // state
            let lat = 21.4225, lng = 39.8262;
            let map, marker;

            // update times + display
            function refreshTimes() {
                try {
                    const method = methodSelect.value;
                    const now = new Date();
                    const times = computePrayerTimes(lat, lng, method, now);
                    fajrEl.textContent = formatTime(times[0]);
                    sunriseEl.textContent = formatTime(times[1]);
                    dhuhrEl.textContent = formatTime(times[2]);
                    asrEl.textContent = formatTime(times[3]);
                    maghribEl.textContent = formatTime(times[4]);
                    ishaEl.textContent = formatTime(times[5]);

                    const dateStr = now.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
                    dateEl.textContent = dateStr;
                    const tz = now.getTimezoneOffset() / -60;
                    tzEl.textContent = `UTC${tz >=0 ? '+' : ''}${tz}`;
                    errorEl.textContent = '';
                } catch (e) {
                    errorEl.textContent = 'error';
                }
            }

            function updateLatLngDisplay() {
                const latStr = lat.toFixed(4);
                const lngStr = lng.toFixed(4);
                const latDir = lat >= 0 ? 'N' : 'S';
                const lngDir = lng >= 0 ? 'E' : 'W';
                mapLatLngEl.textContent = `${Math.abs(lat).toFixed(2)}°${latDir} ${Math.abs(lng).toFixed(2)}°${lngDir}`;
                refreshTimes();
            }

            // geocoding (simple)
            async function searchCity(query) {
                if (!query) return;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                    const data = await res.json();
                    if (data && data[0]) {
                        const { lat: newLat, lon: newLon, display_name } = data[0];
                        lat = parseFloat(newLat);
                        lng = parseFloat(newLon);
                        cityInput.value = display_name.split(',')[0];
                        map.setView([lat, lng], 8);
                        marker.setLatLng([lat, lng]);
                        updateLatLngDisplay();
                    } else {
                        errorEl.textContent = 'not found';
                    }
                } catch {
                    errorEl.textContent = 'geocoding fail';
                }
            }

            // init map
            function initMap() {
                map = L.map('map', { zoomControl: false }).setView([lat, lng], 4);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                marker = L.marker([lat, lng], { draggable: true }).addTo(map);

                marker.on('dragend', (e) => {
                    const pos = marker.getLatLng();
                    lat = pos.lat;
                    lng = pos.lng;
                    updateLatLngDisplay();
                });

                map.on('click', (e) => {
                    const pos = e.latlng;
                    lat = pos.lat;
                    lng = pos.lng;
                    marker.setLatLng(pos);
                    updateLatLngDisplay();
                });

                // initial set
                updateLatLngDisplay();
            }

            // search on click
            searchBtn.addEventListener('click', () => searchCity(cityInput.value.trim()));
            cityInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchCity(cityInput.value.trim());
            });
            methodSelect.addEventListener('change', refreshTimes);

            // periodic update every minute (clock change)
            setInterval(refreshTimes, 60000);

            // start
            window.addEventListener('load', () => {
                initMap();
                // fetch mecca formal name
                setTimeout(() => searchCity('Mecca'), 100);
            });
        })();
    </script>
</body>
</html>
