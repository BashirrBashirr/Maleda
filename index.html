<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>salaat • map — islamic / local times</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f3f1ec;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1c2b33;
        }
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: #ffffffba;
            backdrop-filter: blur(4px);
            border-bottom: 1px solid #d4cdc0;
            font-weight: 350;
            letter-spacing: 0.2px;
        }
        .top h2 { font-weight: 350; font-size: 1.3rem; color: #3f4e56; }
        .top h2 span { color: #8e9ca3; margin-right: 0.3rem; }
        .method-wrap {
            background: #e3ddd2;
            border-radius: 40px;
            padding: 0.25rem 0.8rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .method-wrap select {
            background: transparent;
            border: none;
            font-size: 0.8rem;
            font-weight: 450;
            padding: 0.3rem 0;
            outline: none;
            color: #1f2e36;
        }
        .main { display: flex; flex: 1; overflow: hidden; }
        .map-panel {
            flex: 3;
            position: relative;
            background: #dbd5ca;
            border-right: 1px solid #c2b9ab;
        }
        #map { width: 100%; height: 100%; background: #d6d2c9; }
        .map-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 1px solid #b7ad9e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            color: #1f353f;
            display: flex;
            gap: 10px;
            pointer-events: none;
        }
        .map-overlay span { font-family: 'SF Mono', 'Fira Code', monospace; font-weight: 450; }
        .times-panel {
            flex: 1.2;
            background: #faf8f4;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem 1.2rem;
            border-left: 1px solid #ddd2c4;
            min-width: 260px;
        }
        .place-row {
            display: flex;
            gap: 6px;
            margin-bottom: 1.2rem;
            background: #ede8e0;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #cdc2b4;
        }
        .place-row input {
            flex: 1;
            border: none;
            background: none;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            outline: none;
            color: #1e2f38;
        }
        .place-row button {
            background: #d9d0c2;
            border: none;
            border-radius: 60px;
            padding: 0.5rem 1.4rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2b3c45;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        .place-row button:hover { background: #cdc1b1; }

        .prayer-list {
            margin-top: 0.2rem;
            border-top: 1px solid #dad1c3;
            padding-top: 0.6rem;
        }
        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.2rem;
            border-bottom: 1px solid #e7dfd3;
            font-size: 1.2rem;
            font-weight: 340;
        }
        .prayer-item .name { font-weight: 400; color: #3e535d; }
        .prayer-item .time {
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
        }

        /* Footnote: exact same position/style as original, hijri added on top */
        .footnote {
            margin-top: 1rem;
            font-size: 0.72rem;
            color: #5d6b64;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            border-top: 1px dashed #d3cbbf;
            padding-top: 1rem;
        }
        #hijriDisplay {
            font-size: 0.72rem;
            color: #5d6b64;
        }
        .greg-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.3rem;
        }
        #currentDate { font-size: 0.72rem; color: #5d6b64; }
        #tzOffset    { font-size: 0.72rem; color: #5d6b64; }

        .error-note { color: #b44e3a; font-size: 0.75rem; min-height: 1.2rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="top">
        <h2><span></span> prayer / map</h2>
        <div class="method-wrap">
            <span>method</span>
            <select id="methodSelect">
                <option value="MWL" selected>MWL</option>
                <option value="Jafari">Jafari</option>
                <option value="Karachi">Karachi</option>
                <option value="ISNA">ISNA</option>
                <option value="Makkah">Makkah</option>
                <option value="Egypt">Egypt</option>
                <option value="Tehran">Tehran</option>
            </select>
        </div>
    </div>

    <div class="main">
        <div class="map-panel">
            <div id="map"></div>
            <div class="map-overlay">
                <span>📍</span>
                <span id="mapLatLng">--°N --°E</span>
            </div>
        </div>

        <div class="times-panel">
            <div class="place-row">
                <input type="text" id="cityInput" placeholder="city or place" value="Mecca">
                <button id="searchBtn">🔍</button>
            </div>

            <div class="prayer-list">
                <div class="prayer-item"><span class="name">Fajr</span><span class="time" id="fajr">--:--</span></div>
                <div class="prayer-item"><span class="name">Sunrise</span><span class="time" id="sunrise">--:--</span></div>
                <div class="prayer-item"><span class="name">Dhuhr</span><span class="time" id="dhuhr">--:--</span></div>
                <div class="prayer-item"><span class="name">Asr</span><span class="time" id="asr">--:--</span></div>
                <div class="prayer-item"><span class="name">Maghrib</span><span class="time" id="maghrib">--:--</span></div>
                <div class="prayer-item"><span class="name">Isha</span><span class="time" id="isha">--:--</span></div>
            </div>

            <!-- Same position as original footnote, hijri line added above gregorian -->
            <div class="footnote">
                <span id="hijriDisplay">loading…</span>
                <div class="greg-row">
                    <span id="currentDate"></span>
                    <span id="tzOffset"></span>
                </div>
            </div>

            <div id="errorMsg" class="error-note"></div>
            <div style="margin-top: 0.8rem; font-size: 0.7rem; color:#8d988b;">click map → city name appears</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- adhan-js: high-precision Islamic prayer times based on Jean Meeus Astronomical Algorithms -->
    <script src="https://cdn.jsdelivr.net/npm/adhan@4.4.3/lib/bundles/adhan.umd.min.js"></script>

    <script>
    (function () {

        // ── State ──────────────────────────────────────────────────────────
        let lat = 21.4225, lng = 39.8262; // Mecca default
        let locationTimezone = 'Asia/Riyadh';
        let map, marker;

        // ── adhan-js: calculation parameters by method name ───────────────
        function getCalcParams(name) {
            switch (name) {
                case 'Jafari': {
                    // Jafari / Shia Ithna Ashari
                    const p = adhan.CalculationMethod.Tehran();
                    p.fajrAngle   = 16;
                    p.ishaAngle   = 14;
                    p.maghribAngle = 4;
                    p.ishaInterval = 0;
                    return p;
                }
                case 'Karachi': return adhan.CalculationMethod.Karachi();
                case 'ISNA':    return adhan.CalculationMethod.NorthAmerica();
                case 'Makkah':  return adhan.CalculationMethod.UmmAlQura();
                case 'Egypt':   return adhan.CalculationMethod.Egyptian();
                case 'Tehran':  return adhan.CalculationMethod.Tehran();
                case 'MWL':
                default:        return adhan.CalculationMethod.MuslimWorldLeague();
            }
        }

        // ── Timezone: get IANA string for coordinates ──────────────────────
        // Uses geonames.org public demo (no key). Falls back to browser TZ.
        async function fetchTimezone(la, lo) {
            try {
                const res = await fetch(
                    `https://secure.geonames.org/timezoneJSON?lat=${la}&lng=${lo}&username=demo`,
                    { signal: AbortSignal.timeout(4000) }
                );
                const d = await res.json();
                if (d && d.timezoneId) return d.timezoneId;
            } catch {}
            // fallback: browser's own timezone
            return Intl.DateTimeFormat().resolvedOptions().timeZone;
        }

        // ── Format a Date in a specific IANA timezone → "HH:MM" ───────────
        function formatInTz(dateObj, tz) {
            if (!dateObj || isNaN(dateObj)) return '--:--';
            try {
                return dateObj.toLocaleTimeString('en-GB', {
                    timeZone: tz,
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
            } catch {
                return '--:--';
            }
        }

        // ── UTC offset label for a timezone at a given instant ─────────────
        function tzLabel(tz, date) {
            try {
                const parts = new Intl.DateTimeFormat('en', {
                    timeZone: tz,
                    timeZoneName: 'shortOffset'
                }).formatToParts(date);
                const p = parts.find(x => x.type === 'timeZoneName');
                return p ? p.value : '';
            } catch {
                const off = -date.getTimezoneOffset() / 60;
                return `UTC${off >= 0 ? '+' : ''}${off}`;
            }
        }

        // ── Hijri date (Kuwaiti algorithm) ────────────────────────────────
        function hijriDate(d) {
            d = d || new Date();
            const day = d.getDate(), mo = d.getMonth() + 1, yr = d.getFullYear();
            let jd = Math.floor((1461*(yr+4800+Math.floor((mo-14)/12)))/4)
                   + Math.floor((367*(mo-2-12*Math.floor((mo-14)/12)))/12)
                   - Math.floor((3*Math.floor((yr+4900+Math.floor((mo-14)/12))/100))/4)
                   + day - 32075;
            let l = jd - 1948440 + 10632;
            const n = Math.floor((l-1)/10631);
            l = l - 10631*n + 354;
            const j = Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)
                    + Math.floor(l/5670)*Math.floor((43*l)/15238);
            l = l - Math.floor((30-j)/15)*Math.floor((17719*j)/50)
                  - Math.floor(j/16)*Math.floor((15238*j)/43) + 29;
            const hm = Math.floor((24*l)/709);
            const hd = l - Math.floor((709*hm)/24);
            const hy = 30*n + j - 30;
            const MONTHS = ['Muharram','Safar','Rabiʻ I','Rabiʻ II','Jumada I','Jumada II',
                            'Rajab','Shaʻban','Ramadan','Shawwal','Dhuʻl-Qiʻdah','Dhuʻl-Hijjah'];
            return `${hd} ${MONTHS[(hm-1)%12]} ${hy} Hijri`;
        }

        // ── DOM ────────────────────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const cityInput    = $('cityInput');
        const searchBtn    = $('searchBtn');
        const methodSelect = $('methodSelect');
        const mapLatLngEl  = $('mapLatLng');
        const errorEl      = $('errorMsg');

        // ── Refresh prayer times display ───────────────────────────────────
        function refreshTimes() {
            try {
                const now  = new Date();
                const tz   = locationTimezone;
                const coords = new adhan.Coordinates(lat, lng);
                const params = getCalcParams(methodSelect.value);

                // Determine today's date *at the location* (may differ from browser's date)
                const locDateStr = now.toLocaleDateString('en-CA', { timeZone: tz }); // "YYYY-MM-DD"
                const [ly, lm, ld] = locDateStr.split('-').map(Number);
                const calcDate = new Date(ly, lm - 1, ld); // local noon — adhan uses y/m/d only

                const pt = new adhan.PrayerTimes(coords, calcDate, params);

                $('fajr').textContent    = formatInTz(pt.fajr,    tz);
                $('sunrise').textContent = formatInTz(pt.sunrise,  tz);
                $('dhuhr').textContent   = formatInTz(pt.dhuhr,   tz);
                $('asr').textContent     = formatInTz(pt.asr,     tz);
                $('maghrib').textContent = formatInTz(pt.maghrib, tz);
                $('isha').textContent    = formatInTz(pt.isha,    tz);

                // Dates
                $('hijriDisplay').textContent = hijriDate(now);
                $('currentDate').textContent  = now.toLocaleDateString('en-US', {
                    timeZone: tz, month: 'short', day: 'numeric', year: 'numeric'
                });
                $('tzOffset').textContent = tzLabel(tz, now);

                errorEl.textContent = '';
            } catch (e) {
                errorEl.textContent = 'calculation error';
                console.error(e);
            }
        }

        // ── Location changed: fetch TZ then refresh ────────────────────────
        async function onLocationChange(newLat, newLng, knownTz) {
            lat = newLat; lng = newLng;
            const latDir = lat >= 0 ? 'N' : 'S';
            const lngDir = lng >= 0 ? 'E' : 'W';
            mapLatLngEl.textContent = `${Math.abs(lat).toFixed(2)}°${latDir} ${Math.abs(lng).toFixed(2)}°${lngDir}`;

            locationTimezone = knownTz || await fetchTimezone(lat, lng);
            refreshTimes();
        }

        // ── Reverse geocode → city name in input ───────────────────────────
        async function fetchCityName(la, lo) {
            try {
                const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${la}&lon=${lo}&zoom=10`);
                const data = await res.json();
                const addr = data.address || {};
                cityInput.value = addr.city || addr.town || addr.village || addr.hamlet
                                  || data.display_name.split(',')[0]
                                  || `${la.toFixed(2)}°, ${lo.toFixed(2)}°`;
            } catch {
                cityInput.value = `${la.toFixed(2)}°, ${lo.toFixed(2)}°`;
            }
        }

        // ── Forward geocode ────────────────────────────────────────────────
        async function searchCity(query) {
            if (!query) return;
            try {
                const res  = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if (data && data[0]) {
                    const la = parseFloat(data[0].lat);
                    const lo = parseFloat(data[0].lon);
                    cityInput.value = data[0].display_name.split(',')[0];
                    map.setView([la, lo], 8);
                    marker.setLatLng([la, lo]);
                    await onLocationChange(la, lo, null);
                } else {
                    errorEl.textContent = 'city not found';
                }
            } catch {
                errorEl.textContent = 'geocoding fail';
            }
        }

        // ── IP geolocation on startup ──────────────────────────────────────
        async function initUserLocation() {
            try {
                const res  = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data && data.latitude) {
                    const la = parseFloat(data.latitude);
                    const lo = parseFloat(data.longitude);
                    const tz = data.timezone || null; // ipapi.co gives us the TZ for free!
                    map.setView([la, lo], 6);
                    marker.setLatLng([la, lo]);
                    await fetchCityName(la, lo);
                    await onLocationChange(la, lo, tz);
                    return;
                }
            } catch {}
            // Fallback: Mecca
            await fetchCityName(lat, lng);
            await onLocationChange(lat, lng, 'Asia/Riyadh');
        }

        // ── Map ────────────────────────────────────────────────────────────
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([lat, lng], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
            marker = L.marker([lat, lng], { draggable: true }).addTo(map);

            marker.on('dragend', async e => {
                const p = e.target.getLatLng();
                await fetchCityName(p.lat, p.lng);
                await onLocationChange(p.lat, p.lng, null);
            });

            map.on('click', async e => {
                marker.setLatLng(e.latlng);
                await fetchCityName(e.latlng.lat, e.latlng.lng);
                await onLocationChange(e.latlng.lat, e.latlng.lng, null);
            });

            initUserLocation();
        }

        // ── Events ─────────────────────────────────────────────────────────
        searchBtn.addEventListener('click', () => searchCity(cityInput.value.trim()));
        cityInput.addEventListener('keypress', e => { if (e.key === 'Enter') searchCity(cityInput.value.trim()); });
        methodSelect.addEventListener('change', refreshTimes);
        setInterval(refreshTimes, 60000);

        window.addEventListener('load', initMap);

    })();
    </script>
</body>
</html>
