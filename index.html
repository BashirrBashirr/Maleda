<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>salaat • map — fixed times & hijri</title>
    <!-- Leaflet (light) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f3f1ec;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1c2b33;
        }
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: #ffffffba;
            backdrop-filter: blur(4px);
            border-bottom: 1px solid #d4cdc0;
            font-weight: 350;
            letter-spacing: 0.2px;
        }
        .top h2 {
            font-weight: 350;
            font-size: 1.3rem;
            color: #3f4e56;
        }
        .top h2 span {
            color: #8e9ca3;
            margin-right: 0.3rem;
        }
        .method-wrap {
            background: #e3ddd2;
            border-radius: 40px;
            padding: 0.25rem 0.8rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .method-wrap select {
            background: transparent;
            border: none;
            font-size: 0.8rem;
            font-weight: 450;
            padding: 0.3rem 0;
            outline: none;
            color: #1f2e36;
        }
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .map-panel {
            flex: 3;
            position: relative;
            background: #dbd5ca;
            border-right: 1px solid #c2b9ab;
        }
        #map {
            width: 100%;
            height: 100%;
            background: #d6d2c9;
        }
        .map-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 1px solid #b7ad9e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            color: #1f353f;
            display: flex;
            gap: 10px;
            pointer-events: none;
        }
        .map-overlay span {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-weight: 450;
        }
        .times-panel {
            flex: 1.2;
            background: #faf8f4;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem 1.2rem;
            border-left: 1px solid #ddd2c4;
            min-width: 260px;
        }
        .place-row {
            display: flex;
            gap: 6px;
            margin-bottom: 1.2rem;
            background: #ede8e0;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #cdc2b4;
        }
        .place-row input {
            flex: 1;
            border: none;
            background: none;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            outline: none;
            color: #1e2f38;
        }
        .place-row button {
            background: #d9d0c2;
            border: none;
            border-radius: 60px;
            padding: 0.5rem 1.4rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2b3c45;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        .place-row button:hover {
            background: #cdc1b1;
        }
        .prayer-list {
            margin-top: 0.2rem;
            border-top: 1px solid #dad1c3;
            padding-top: 0.6rem;
        }
        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.2rem;
            border-bottom: 1px solid #e7dfd3;
            font-size: 1.2rem;
            font-weight: 340;
        }
        .prayer-item .name {
            font-weight: 400;
            color: #3e535d;
        }
        .prayer-item .time {
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
        }
        /* combined date block: gregorian + hijri in same style */
        .date-block {
            margin-top: 0.8rem;
            border-top: 1px dashed #d3cbbf;
            padding-top: 0.9rem;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            color: #2b444f;
        }
        .date-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
        }
        .date-row .left {
            font-weight: 370;
            color: #2f4a55;
        }
        .date-row .right {
            font-weight: 400;
            color: #1f3a45;
            background: #e7e2d8;
            padding: 0.1rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .hijri-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            margin-top: 0.1rem;
        }
        .hijri-row .left {
            font-weight: 370;
            color: #2f4a55;
        }
        .hijri-row .right {
            font-weight: 400;
            color: #1f3a45;
            background: #e7e2d8;
            padding: 0.1rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .error-note {
            color: #b44e3a;
            font-size: 0.75rem;
            min-height: 1.2rem;
            margin-top: 0.5rem;
        }
        .city-confirm {
            font-size: 0.7rem;
            color: #4f6b78;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div class="top">
        <h2><span></span> prayer / map</h2>
        <div class="method-wrap">
            <span>method</span>
            <select id="methodSelect">
                <option value="3" selected>MWL</option>
                <option value="0">Jafari</option>
                <option value="1">Karachi</option>
                <option value="2">ISNA</option>
                <option value="4">Makkah</option>
                <option value="5">Egypt</option>
                <option value="7">Tehran</option>
            </select>
        </div>
    </div>

    <div class="main">
        <div class="map-panel">
            <div id="map"></div>
            <div class="map-overlay">
                <span>📍</span>
                <span id="mapLatLng">--°N --°E</span>
            </div>
        </div>

        <div class="times-panel">
            <div class="place-row">
                <input type="text" id="cityInput" placeholder="city or place" value="Mecca">
                <button id="searchBtn">🔍</button>
            </div>

            <!-- prayer times list -->
            <div class="prayer-list">
                <div class="prayer-item"><span class="name">Fajr</span><span class="time" id="fajr">--:--</span></div>
                <div class="prayer-item"><span class="name">Sunrise</span><span class="time" id="sunrise">--:--</span></div>
                <div class="prayer-item"><span class="name">Dhuhr</span><span class="time" id="dhuhr">--:--</span></div>
                <div class="prayer-item"><span class="name">Asr</span><span class="time" id="asr">--:--</span></div>
                <div class="prayer-item"><span class="name">Maghrib</span><span class="time" id="maghrib">--:--</span></div>
                <div class="prayer-item"><span class="name">Isha</span><span class="time" id="isha">--:--</span></div>
            </div>

            <!-- unified date block: exactly like "Mar 9, 2026   UTC-3 / 22 Ramadan 1447 AH" -->
            <div class="date-block">
                <div class="date-row">
                    <span class="left" id="currentDate">-- --- ----</span>
                    <span class="right" id="tzOffset">UTC--</span>
                </div>
                <div class="hijri-row">
                    <span class="left" id="hijriDisplay">-- ----- ----</span>
                    <span class="right">AH</span>
                </div>
            </div>

            <div id="errorMsg" class="error-note"></div>
            <div style="margin-top: 0.8rem; font-size: 0.7rem; color:#8d988b;">click map → city name appears</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        (function() {
            // ---------- precise prayer calculation (fixed negative times) ----------
            const degRad = Math.PI / 180;

            function computePrayerTimes(lat, lon, method, date = new Date()) {
                const y = date.getFullYear();
                const m = date.getMonth() + 1;
                const d = date.getDate();

                // julian day
                const jd = (() => {
                    let year = y, month = m, day = d;
                    if (month <= 2) { year -= 1; month += 12; }
                    const A = Math.floor(year / 100);
                    const B = 2 - A + Math.floor(A / 4);
                    return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + B - 1524.5;
                })();

                const daysSinceJ2000 = jd - 2451545.0;
                const g = (357.529 + 0.98560028 * daysSinceJ2000) % 360;
                const q = (280.459 + 0.98564736 * daysSinceJ2000) % 360;
                const L = (q + 1.915 * Math.sin(g * degRad) + 0.020 * Math.sin(2 * g * degRad)) % 360;
                const eps = 23.439 - 0.00000036 * daysSinceJ2000;
                const RA = Math.atan2(Math.cos(eps * degRad) * Math.sin(L * degRad), Math.cos(L * degRad)) / degRad;
                let decl = Math.asin(Math.sin(eps * degRad) * Math.sin(L * degRad)) / degRad;

                // equation of time (minutes)
                let eqTime = ((q - 0.0057183 - RA + (q - L < 180 ? 0 : 360)) % 360) * 4;

                // solar noon (minutes from midnight UTC)
                const noon = 720 - 4 * lon - eqTime; 

                // method angles
                const angles = {
                    0: { fajr: 16, isha: 14 },       // Jafari
                    1: { fajr: 18, isha: 18 },        // Karachi
                    2: { fajr: 15, isha: 15 },         // ISNA
                    3: { fajr: 18, isha: 17 },         // MWL
                    4: { fajr: 18.5, isha: '90min' },  // Makkah
                    5: { fajr: 19.5, isha: 17.5 },     // Egypt
                    7: { fajr: 17.7, isha: 14 }        // Tehran
                };
                const mth = parseInt(method, 10);
                const fajrAngle = angles[mth]?.fajr ?? 18;
                let ishaAngle = angles[mth]?.isha ?? 17;
                let ishaFixedMin = null;
                if (mth === 4 && ishaAngle === '90min') { ishaFixedMin = 90; ishaAngle = null; }

                const latRad = lat * degRad;
                const declRad = decl * degRad;

                // safe acos helper
                const acosSafe = (x) => Math.acos(Math.max(-1, Math.min(1, x))) / degRad;

                const computeTime = (angle, isSunrise = false, isAsr = false) => {
                    if (isAsr) {
                        // asr (shafii) shadow = 1
                        const arg = (Math.sin(Math.atan(1 / (1 + Math.tan(Math.abs(lat - decl) * degRad)))) - Math.sin(declRad) * Math.sin(latRad)) 
                                    / (Math.cos(declRad) * Math.cos(latRad));
                        const altAsr = Math.asin(Math.max(-1, Math.min(1, arg))) / degRad;
                        const cosH = (Math.sin(altAsr * degRad) - Math.sin(declRad)*Math.sin(latRad)) 
                                    / (Math.cos(declRad)*Math.cos(latRad));
                        const H = acosSafe(cosH);
                        return noon + (H * 4);
                    }
                    if (isSunrise) {
                        const cosH = (Math.sin(-0.833 * degRad) - Math.sin(declRad)*Math.sin(latRad)) 
                                    / (Math.cos(declRad)*Math.cos(latRad));
                        const H = acosSafe(cosH);
                        return noon - (H * 4);
                    }
                    const cosH = (Math.sin(angle * degRad) - Math.sin(declRad)*Math.sin(latRad)) 
                                / (Math.cos(declRad)*Math.cos(latRad));
                    const H = acosSafe(cosH);
                    return noon - (H * 4);   // fajr / isha (after correction we invert for isha)
                };

                const fajr = computeTime(fajrAngle, false, false);
                const sunrise = computeTime(null, true, false);
                const dhuhr = noon;
                const asr = computeTime(null, false, true);
                const maghrib = computeTime(null, true, false); // use same as sunrise but for sunset? we need accurate sunset: use -0.833 same as sunrise, but for maghrib we keep sunset = that value.
                // In fact sunset is same as sunrise formula but we keep separate variable; but accurate: maghrib = time when sun -0.833°
                const sunset = computeTime(null, true, false); // yes, same as sunrise angle
                const maghribExact = sunset; 
                let isha;
                if (ishaFixedMin !== null) isha = maghribExact + ishaFixedMin;
                else {
                    // isha is after sunset; but computeTime gives time before noon for angle? we need to compute isha using angle (evening)
                    const cosHIsha = (Math.sin(ishaAngle * degRad) - Math.sin(declRad)*Math.sin(latRad)) 
                                    / (Math.cos(declRad)*Math.cos(latRad));
                    const HIsha = acosSafe(cosHIsha);
                    // isha occurs at noon + H*4 (since in evening H is measured from noon)
                    const ishaEvening = noon + HIsha * 4;
                    isha = ishaEvening;
                }

                // assemble times: fajr, sunrise, dhuhr, asr, maghrib, isha
                let times = [fajr, sunrise, dhuhr, asr, maghribExact, isha];
                
                // ---- CRITICAL FIX: ensure all times are within [0,1440) and correctly ordered, no negatives ----
                // first wrap each to 0-1440
                times = times.map(t => ((t % 1440) + 1440) % 1440);

                // fix ordering for edge cases (isha may be next day) – but we keep as absolute minutes. 
                // Additionally ensure fajr < sunrise etc? but we leave as computed.
                // However original negative numbers came from incorrect isha calculation (should be > maghrib). 
                // If isha ended up less than maghrib due to angle (high latitude), we adjust by +1440*? but keep simple: add 1440 if isha < maghrib.
                if (isha < maghribExact) times[5] = isha + 1440; // isha belongs to next day -> show as >24? we will mod again on display.
                
                // final wrap for display (formatTime will mod again)
                times = times.map(t => ((t % 1440) + 1440) % 1440);
                return times;
            }

            const formatTime = (min) => {
                if (min === null || isNaN(min)) return '--:--';
                let m = ((min % 1440) + 1440) % 1440; // force positive
                const h = Math.floor(m / 60) % 24;
                const minute = Math.floor(m % 60);
                return `${h.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`;
            };

            // ---------- Hijri (islamic) date approximation (same font, now displayed in date block) ----------
            function getHijriDate(gregDate = new Date()) {
                // simple fixed math (Kuwaiti algorithm style)
                const day = gregDate.getDate();
                const month = gregDate.getMonth() + 1;
                const year = gregDate.getFullYear();
                if (year < 1900) return { year: 0, month: 0, day: 0 };
                
                let jd = Math.floor((1461 * (year + 4800 + Math.floor((month - 14) / 12))) / 4) +
                          Math.floor((367 * (month - 2 - 12 * (Math.floor((month - 14) / 12)))) / 12) -
                          Math.floor((3 * (Math.floor((year + 4900 + Math.floor((month - 14) / 12)) / 100))) / 4) + day - 32075;
                // julian to islamic
                let l = jd - 1948440 + 10632;
                let n = Math.floor((l - 1) / 10631);
                l = l - 10631 * n + 354;
                let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
                l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
                let m = Math.floor((24 * l) / 709);
                let d = l - Math.floor((709 * m) / 24);
                let y = 30 * n + j - 30;

                return { year: y, month: m, day: d };
            }

            function formatHijri(date) {
                const h = getHijriDate(date);
                if (!h || h.year < 0 || h.month < 1) return '-- -----';
                const monthNames = ['Muharram', 'Safar', 'Rabiʻ I', 'Rabiʻ II', 'Jumada I', 'Jumada II', 'Rajab', 'Shaʻban', 'Ramadan', 'Shawwal', 'Dhuʻl-Qiʻdah', 'Dhuʻl-Hijjah'];
                const mName = monthNames[(h.month - 1) % 12] || '';
                return `${h.day} ${mName} ${h.year}`;
            }

            // ---------- DOM elements ----------
            const cityInput = document.getElementById('cityInput');
            const searchBtn = document.getElementById('searchBtn');
            const methodSelect = document.getElementById('methodSelect');
            const fajrEl = document.getElementById('fajr');
            const sunriseEl = document.getElementById('sunrise');
            const dhuhrEl = document.getElementById('dhuhr');
            const asrEl = document.getElementById('asr');
            const maghribEl = document.getElementById('maghrib');
            const ishaEl = document.getElementById('isha');
            const mapLatLngEl = document.getElementById('mapLatLng');
            const dateEl = document.getElementById('currentDate');
            const tzEl = document.getElementById('tzOffset');
            const hijriDisplay = document.getElementById('hijriDisplay');
            const errorEl = document.getElementById('errorMsg');

            // state
            let lat = 21.4225, lng = 39.8262; // default Mecca
            let map, marker;
            let currentCityName = 'Mecca';

            // update times + gregorian + hijri
            function refreshTimes() {
                try {
                    const method = methodSelect.value;
                    const now = new Date();
                    const times = computePrayerTimes(lat, lng, method, now);
                    fajrEl.textContent = formatTime(times[0]);
                    sunriseEl.textContent = formatTime(times[1]);
                    dhuhrEl.textContent = formatTime(times[2]);
                    asrEl.textContent = formatTime(times[3]);
                    maghribEl.textContent = formatTime(times[4]);
                    ishaEl.textContent = formatTime(times[5]);

                    // Gregorian line: Mar 9, 2026
                    const dateStr = now.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
                    dateEl.textContent = dateStr;
                    const tz = now.getTimezoneOffset() / -60;
                    tzEl.textContent = `UTC${tz >=0 ? '+' : ''}${tz}`;

                    // Hijri line: "22 Ramadan 1447" (AH is appended as static)
                    hijriDisplay.textContent = formatHijri(now);

                    errorEl.textContent = '';
                } catch (e) {
                    errorEl.textContent = 'prayer time error';
                }
            }

            function updateLatLngDisplay() {
                const latStr = lat.toFixed(4);
                const lngStr = lng.toFixed(4);
                const latDir = lat >= 0 ? 'N' : 'S';
                const lngDir = lng >= 0 ? 'E' : 'W';
                mapLatLngEl.textContent = `${Math.abs(lat).toFixed(2)}°${latDir} ${Math.abs(lng).toFixed(2)}°${lngDir}`;
                refreshTimes();
            }

            // reverse geocode: get city name
            async function fetchCityName(lat, lon) {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                    const data = await res.json();
                    if (data && data.display_name) {
                        const addr = data.address || {};
                        const city = addr.city || addr.town || addr.village || addr.hamlet || data.display_name.split(',')[0];
                        currentCityName = city || 'unknown';
                        cityInput.value = currentCityName;
                    } else {
                        cityInput.value = `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
                    }
                } catch {
                    cityInput.value = `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
                }
            }

            // forward geocoding
            async function searchCity(query) {
                if (!query) return;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                    const data = await res.json();
                    if (data && data[0]) {
                        const { lat: newLat, lon: newLon, display_name } = data[0];
                        lat = parseFloat(newLat);
                        lng = parseFloat(newLon);
                        const shortName = display_name.split(',')[0];
                        cityInput.value = shortName;
                        currentCityName = shortName;
                        map.setView([lat, lng], 8);
                        marker.setLatLng([lat, lng]);
                        updateLatLngDisplay();
                    } else {
                        errorEl.textContent = 'city not found';
                    }
                } catch {
                    errorEl.textContent = 'geocoding fail';
                }
            }

            // initial location via ip
            async function initUserLocation() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    if (data && data.latitude && data.longitude) {
                        lat = parseFloat(data.latitude);
                        lng = parseFloat(data.longitude);
                        currentCityName = data.city || 'your location';
                        cityInput.value = currentCityName;
                        map.setView([lat, lng], 6);
                        marker.setLatLng([lat, lng]);
                        updateLatLngDisplay();
                        fetchCityName(lat, lng);
                    } else {
                        fetchCityName(lat, lng);
                    }
                } catch (e) {
                    fetchCityName(lat, lng);
                } finally {
                    refreshTimes();
                }
            }

            // map init
            function initMap() {
                map = L.map('map', { zoomControl: false }).setView([lat, lng], 5);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                marker = L.marker([lat, lng], { draggable: true }).addTo(map);

                marker.on('dragend', async (e) => {
                    const pos = marker.getLatLng();
                    lat = pos.lat;
                    lng = pos.lng;
                    await fetchCityName(lat, lng);
                    updateLatLngDisplay();
                });

                map.on('click', async (e) => {
                    const pos = e.latlng;
                    lat = pos.lat;
                    lng = pos.lng;
                    marker.setLatLng(pos);
                    await fetchCityName(lat, lng);
                    updateLatLngDisplay();
                });

                initUserLocation().then(() => refreshTimes());
            }

            searchBtn.addEventListener('click', () => searchCity(cityInput.value.trim()));
            cityInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchCity(cityInput.value.trim());
            });
            methodSelect.addEventListener('change', refreshTimes);

            setInterval(refreshTimes, 60000);

            window.addEventListener('load', initMap);
        })();
    </script>
</body>
</html>
